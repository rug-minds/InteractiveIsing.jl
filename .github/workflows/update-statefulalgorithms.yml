name: Update StatefulAlgorithms Subtree

on:
  repository_dispatch:
    types: [update-statefulalgorithms]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

concurrency:
  group: update-statefulalgorithms-subtree
  cancel-in-progress: false

jobs:
  update-subtree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull StatefulAlgorithms subtree
        run: |
          before_sha="$(git rev-parse HEAD)"
          ./scripts/pull-statefulalgorithms-subtree-bash.sh
          after_sha="$(git rev-parse HEAD)"

          if [[ "$before_sha" != "$after_sha" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
        id: pull_subtree

      - name: Push changes
        if: steps.pull_subtree.outputs.changed == 'true'
        run: git push origin HEAD:main
